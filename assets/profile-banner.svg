  </defs>
  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <circle cx="1060" cy="70" r="120" fill="#DCEBFF" opacity="0.8"/>
  <circle cx="1120" cy="250" r="160" fill="#F2E8D7" opacity="0.75"/>
  <circle cx="120" cy="270" r="120" fill="#EAF3FF" opacity="0.9"/>
  <g opacity="0.5" stroke="#8CBDF3" fill="none">
